services:
  nginx-proxy:
    environment:
      # ENABLE_VIRTUAL_CONFIG not set, defaults to false
      VIRTUAL_CLIENT_MAX_BODY_SIZE: "50m"

  web:
    image: web
    expose:
      - "80"
    environment:
      WEB_PORTS: "80"
      VIRTUAL_HOST: web.nginx-proxy.tld
      VIRTUAL_KEEPALIVE_TIMEOUT: "60s"
