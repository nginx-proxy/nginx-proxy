services:
  nginx-proxy:
    volumes:
      - ${PYTEST_MODULE_PATH}/redirect_vhostd.conf:/etc/nginx/vhost.d/nginx-proxy.tld:ro
      - ${PYTEST_MODULE_PATH}/redirect_vhostd.conf:/etc/nginx/vhost.d/nginx-proxy.tld_location:ro

  web1:
    image: web
    expose:
      - "81"
    environment:
      WEB_PORTS: "81"
      VIRTUAL_HOST: "nginx-proxy.tld"
